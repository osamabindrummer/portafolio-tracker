name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate data/latest.json
        run: |
          if [ ! -f data/latest.json ]; then
            echo "data/latest.json not found — skipping validation"
            exit 0
          fi
          python -m json.tool data/latest.json > /dev/null
